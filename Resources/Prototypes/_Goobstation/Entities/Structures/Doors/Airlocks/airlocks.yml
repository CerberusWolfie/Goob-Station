- type: entity # Goobstation - SM Door High Sec but Glass
  id: SealedAirlockAtmosphericsGlass
  parent: HighSecDoor
  name: sealed atmospherics glass airlock
  description: It protects you from rads, lets you see in, and has sealed protection!
  suffix: Atmospherics, Locked
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Glass/rad-sec_atmospherics.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49" # don't want this colliding with walls or they won't close
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsAtmospherics ]
  - type: RadiationBlocker
    resistance: 20
  - type: Door # Stops Occlusion
    occludes: false
  - type: Occluder # Stops Occlusion
    enabled: false

- type: entity # Goobstation - Sweet jani door recolour
  parent: Airlock
  id: AirlockJanitor
  suffix: Janitor
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Standard/janitor.rsi
  - type: PaintableAirlock
    department: Civilian
  - type: Wires
    layoutId: AirlockService

- type: entity
  parent: AirlockGlass
  id: AirlockJanitorGlass
  suffix: Janitor
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Glass/janitor.rsi
  - type: PaintableAirlock
    department: Civilian
  - type: Wires
    layoutId: AirlockService
